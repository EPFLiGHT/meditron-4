<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSONL Answer Comparator</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">Local Tool</p>
      <h1>JSONL Answer Comparator</h1>
      <p class="subtitle">Load two JSONL files, match records by shared ID, and compare markdown answers side by side.</p>
    </header>

    <section class="controls card">
      <div class="file-inputs">
        <label class="file-picker" for="file-a">
          <span class="picker-label">File A</span>
          <input id="file-a" type="file" accept=".jsonl,.txt,application/json" />
        </label>
        <label class="file-picker" for="file-b">
          <span class="picker-label">File B</span>
          <input id="file-b" type="file" accept=".jsonl,.txt,application/json" />
        </label>
      </div>

      <div class="control-row">
        <button id="load-btn" class="primary-btn" type="button">Load &amp; Compare</button>

        <div class="nav-group" aria-label="Record navigation">
          <button id="prev-btn" type="button" disabled>Prev</button>
          <button id="next-btn" type="button" disabled>Next</button>
        </div>

        <label class="jump-wrap" for="jump-input">
          <span>Jump</span>
          <input id="jump-input" type="number" min="1" step="1" disabled>
        </label>

        <output id="counter" class="counter" aria-live="polite">0 / 0</output>
      </div>

      <div id="status" class="status" aria-live="polite">Choose two JSONL files to begin.</div>
      <div id="errors" class="errors" role="alert" aria-live="assertive"></div>
    </section>

    <section class="question card">
      <div class="card-head">
        <h2>Question</h2>
        <span id="record-id" class="pill">ID: -</span>
      </div>
      <article id="question-content" class="markdown-body empty">No record loaded.</article>
    </section>

    <section class="answers-grid">
      <article class="answer card">
        <div class="card-head">
          <h2>Answer A</h2>
          <span id="label-a" class="pill">File A</span>
        </div>
        <div id="answer-a" class="markdown-body empty">No record loaded.</div>
      </article>

      <article class="answer card">
        <div class="card-head">
          <h2>Answer B</h2>
          <span id="label-b" class="pill">File B</span>
        </div>
        <div id="answer-b" class="markdown-body empty">No record loaded.</div>
      </article>
    </section>
  </main>

  <script src="./vendor/marked.min.js"></script>
  <script src="./vendor/purify.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
