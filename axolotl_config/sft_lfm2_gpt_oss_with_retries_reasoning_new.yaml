# ==========================================
# Base Model & Tokenizer
# ==========================================
wandb_name: sft_lfm2_gpt_oss_with_retries_reasoning_new
output_dir: $STORAGE_ROOT/meditron/models/sft_lfm2_gpt_oss_with_retries_reasoning_new
dataset_prepared_path: $USER_STORAGE/prepared/sft_lfm2_gpt_oss_with_retries_reasoning_new

base_model: LiquidAI/LFM2-2.6B-Exp
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: true         

# ==========================================
# Hardware & Precision
# ==========================================
load_in_8bit: false
load_in_4bit: false
strict: false
bf16: auto          
fp16: false
tf32: true          
flash_attention: false           # CHANGED: LFM uses custom sequence mixers, standard FA2 will likely crash

# ==========================================
# Dataset & Formatting
# ==========================================
datasets:
  - path: /users/theimer/meditron-4/meditron_4_gpt_oss_with_retries_reasoning_low_resumed_cleaned_no_system.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    roles:
      system: [system]
      user: [user, human]
      assistant: [assistant, gpt]

val_set_size: 0.05

sequence_len: 4096       
sample_packing: true    
eval_sample_packing: false
pad_to_sequence_len: true

# ==========================================
# Training Hyperparameters
# ==========================================
num_epochs: 1
micro_batch_size: 4             
gradient_accumulation_steps: 16 
gradient_checkpointing: true    
gradient_checkpointing_kwargs:
  use_reentrant: false

optimizer: adamw_torch         
learning_rate: 2e-5             
lr_scheduler: cosine
warmup_ratio: 0.03               
weight_decay: 0.01

train_on_inputs: false          
group_by_length: false

# ==========================================
# Logging & Evaluation
# ==========================================
logging_steps: 1
evals_per_epoch: 4
eval_max_new_tokens: 128
saves_per_epoch: 0
wandb_project: $WANDB_PROJECT
wandb_entity: $WANDB_ENTITY
wandb_watch:

# ==========================================
# DeepSpeed
# ==========================================
deepspeed: $PROJECT_ROOT/axolotl_config/deepspeed_zero_3.json 