# ========================
# Meditron-4 KD (Teacher Logprobs)
# ========================
base_model: $STORAGE_ROOT/apertus/huggingface/meta-llama/Llama-3.1-8B-Instruct

output_dir: $STORAGE_ROOT/meditron/models/kd_llama-3-1_medgemma_logprobs

dataset_prepared_path: $USER_STORAGE/prepared/kd_llama-3-1_medgemma_logprobs
load_prepared_dataset: true

wandb_name: kd_llama-3-1_medgemma_logprobs

# ========================
# KD Plugin / Trainer
# ========================
plugins:
  - "axolotl.integrations.kd.KDPlugin"

kd_trainer: true
kd_ce_alpha: 0.1
kd_alpha: 0.9
kd_temperature: 1.0

# Recommended in Axolotl KD docs to reduce VRAM.
torch_compile: true

# ========================
# Hardware & Speed
# ========================
deepspeed: $PROJECT_ROOT/axolotl_config/deepspeed_zero_3.json
bf16: true
tf32: false
tf16: false
flash_attention: true
flash_attn_rms_norm: true
flash_attn_fuse_qkv: false
xformers_attention: null
strict: false
use_cache: false

# ========================
# Dataset (KD)
# ========================
datasets:
  - path: $STORAGE_ROOT/meditron/datasets/distilled/medgemma_27b_all/meditron_4_merged_all_source_distillation_google_medgemma-27b-text-it_kd_chatonly.jsonl
    ds_type: json
    type: "axolotl.integrations.kd.chat_template"
    field_messages: conversations
    logprobs_field: distilled_token_logprobs
    # Keep this 1.0 to avoid extra temperature remapping in KD loader.
    temperature: 1.0
    message_property_mappings:
      role: from
      content: value
    roles:
      system: [system]
      user: [user, human]
      assistant: [assistant, gpt, model]

dataset_processes: 32
shuffle_merged_datasets: true

# ========================
# Training Hyperparameters
# ========================
type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
sequence_len: 8192
sample_packing: false
pad_to_sequence_len: true
group_by_length: false
train_on_inputs: false

special_tokens:
  pad_token: <|end_of_text|>

num_epochs: 1
micro_batch_size: 4
gradient_accumulation_steps: 2
max_grad_norm: 1.0

# ========================
# Optimization
# ========================
optimizer: adamw_torch
optim_args:
  fused: true
learning_rate: 5e-6
lr_scheduler: cosine
cosine_min_lr_ratio: 0.1
warmup_ratio: 0.0
weight_decay: 0.05

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# ========================
# Quantization (Disabled)
# ========================
load_in_4bit: false
load_in_8bit: false

# ========================
# Logging & Evaluation
# ========================
logging_steps: 1
saves_per_epoch: 1
evals_per_epoch: 0
eval_set_size: 0.0
eval_table_size: null
early_stopping_patience: null

wandb_project: $WANDB_PROJECT
wandb_entity: $WANDB_ENTITY
